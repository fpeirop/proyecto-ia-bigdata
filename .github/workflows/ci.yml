name: CI — SmartTrafficFlow AI

on:
  push:
    branches:
      - main       
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # ============================================================================
  # JOB 1: Calidad de código (lint + format check)
  # ============================================================================
  lint:
    name: Calidad de código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias de desarrollo
        run: |
          pip install --upgrade pip
          pip install -r environment/requirements-dev.txt

      - name: Comprobar formato con Black
        run: black --check src/ tests/
        continue-on-error: true

      - name: Ejecutar linter Ruff
        run: ruff check src/ tests/
        continue-on-error: true

  # ============================================================================
  # JOB 2: Tests automáticos
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint  # Solo se ejecuta si el lint pasa

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r environment/requirements.txt
          pip install -r environment/requirements-dev.txt

      - name: Ejecutar tests con pytest
        run: pytest tests/ -v --tb=short

      - name: Generar reporte de cobertura
        run: pytest tests/ --cov=src --cov-report=xml
        continue-on-error: true

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
